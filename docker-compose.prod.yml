version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: medical_record_mysql_prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: medical_record
      MYSQL_USER: ${DB_USER:-app_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-app_password}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./backend/src/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medical_record_prod_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.prod
    container_name: medical_record_backend_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-app_user}
      DB_PASSWORD: ${DB_PASSWORD:-app_password}
      DB_NAME: medical_record
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1h
      KIMI_API_KEY: ${KIMI_API_KEY}
      KIMI_BASE_URL: https://api.moonshot.cn/v1
    volumes:
      - backend_uploads_prod:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - medical_record_prod_network

  nginx:
    image: nginx:alpine
    container_name: medical_record_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - medical_record_prod_network

volumes:
  mysql_data_prod:
  backend_uploads_prod:

networks:
  medical_record_prod_network:
    driver: bridge
